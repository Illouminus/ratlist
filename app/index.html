<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#fbf6ef" />
    <meta name="color-scheme" content="light" />

    <title>Rat List — wishlist for the rats</title>
    <meta
      name="description"
      content="A quiet, ad-free wishlist + Secret Santa for friend circles. Share a list by link, hide claims from the gift-receiver, run a draw inside a circle."
    />

    <link rel="canonical" href="https://ratlist.app/" />

    <!-- Favicon set + PWA manifest. SVG is preferred where supported
         (sharp at any zoom), with PNG fallbacks for older browsers and
         Apple home-screen. -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="apple-mobile-web-app-title" content="Rat List" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />

    <!-- Open Graph. og:image is rendered on the fly by the og-image
         Supabase Edge Function; Vercel rewrites /og.png onto it so
         crawlers see a clean ratlist.app URL. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Rat List" />
    <meta property="og:title" content="Rat List — wishlist for the rats" />
    <meta
      property="og:description"
      content="A quiet, ad-free wishlist + Secret Santa for friend circles."
    />
    <meta property="og:url" content="https://ratlist.app/" />
    <meta property="og:image" content="https://ratlist.app/og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:locale:alternate" content="ru_RU" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Rat List — wishlist for the rats" />
    <meta
      name="twitter:description"
      content="A quiet, ad-free wishlist + Secret Santa for friend circles."
    />
    <meta name="twitter:image" content="https://ratlist.app/og.png" />

    <!-- Schema.org WebApplication. Helps Google understand what this -->
    <!-- product is at indexing time. -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Rat List",
        "alternateName": "Крысиные желания",
        "url": "https://ratlist.app/",
        "applicationCategory": "LifestyleApplication",
        "operatingSystem": "Web",
        "offers": { "@type": "Offer", "price": "0", "priceCurrency": "EUR" },
        "description": "A quiet, ad-free wishlist + Secret Santa app for friend circles."
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
