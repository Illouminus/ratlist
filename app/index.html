<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#fbf6ef" />
    <meta name="color-scheme" content="light" />

    <title>Rat List — wishlist for the rats</title>
    <meta
      name="description"
      content="A quiet, ad-free wishlist + Secret Santa for friend circles. Share a list by link, hide claims from the gift-receiver, run a draw inside a circle."
    />

    <link rel="canonical" href="https://ratlist.app/" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Open Graph. og:image is deliberately omitted for now — Phase 1B
         will add a server-rendered preview PNG (satori + resvg). Without
         it social previews fall back to title + description, which is
         fine for the soft launch. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Rat List" />
    <meta property="og:title" content="Rat List — wishlist for the rats" />
    <meta
      property="og:description"
      content="A quiet, ad-free wishlist + Secret Santa for friend circles."
    />
    <meta property="og:url" content="https://ratlist.app/" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:locale:alternate" content="ru_RU" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Rat List — wishlist for the rats" />
    <meta
      name="twitter:description"
      content="A quiet, ad-free wishlist + Secret Santa for friend circles."
    />

    <!-- Schema.org WebApplication. Helps Google understand what this -->
    <!-- product is at indexing time. -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Rat List",
        "alternateName": "Крысиные желания",
        "url": "https://ratlist.app/",
        "applicationCategory": "LifestyleApplication",
        "operatingSystem": "Web",
        "offers": { "@type": "Offer", "price": "0", "priceCurrency": "EUR" },
        "description": "A quiet, ad-free wishlist + Secret Santa app for friend circles."
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
